<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} - Now Playing</title>

  <!-- Open Graph -->
  <meta property="og:title" content="{{OG_TITLE}}">
  <meta property="og:description" content="{{OG_DESCRIPTION}}">
  <meta property="og:image" content="{{OG_IMAGE}}">
  <meta property="og:url" content="{{OG_URL}}">
  <meta property="og:type" content="music.playlist">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{OG_TITLE}}">
  <meta name="twitter:description" content="{{OG_DESCRIPTION}}">
  <meta name="twitter:image" content="{{OG_IMAGE}}">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="content-wrapper">
      <!-- 左：歌单信息 -->
      <a id="playlist-link" href="{{OG_URL}}" target="_blank" rel="noopener noreferrer" class="playlist-header">
        <img id="playlist-cover" src="{{COVER}}" alt="Playlist cover">
        <div class="playlist-info">
          <h2 id="playlist-title">{{TITLE}}</h2>
          <p id="playlist-author">{{AUTHOR}}</p>
        </div>
      </a>

      <!-- 右：当前播放 -->
      <div id="player" class="player hidden">
        <div class="album-art">
          <img id="album-cover" src="" alt="Album cover">
        </div>
        <div class="info">
          <h2 id="track-name">—</h2>
          <p id="artist-name">—</p>
          <p id="album-name">—</p>
        </div>
      </div>
    </div>

    <div id="status">加载中...</div>
    <div id="error" class="error hidden"></div>
  </div>

  <div id="status-bar">
    <div id="status-icon" class="status-icon paused"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
