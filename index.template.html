<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} - Now Playing</title>

  <!-- Open Graph -->
  <meta property="og:title" content="{{OG_TITLE}}">
  <meta property="og:description" content="{{OG_DESCRIPTION}}">
  <meta property="og:image" content="{{OG_IMAGE}}">
  <meta property="og:url" content="{{OG_URL}}">
  <meta property="og:type" content="music.playlist">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{OG_TITLE}}">
  <meta name="twitter:description" content="{{OG_DESCRIPTION}}">
  <meta name="twitter:image" content="{{OG_IMAGE}}">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- 歌单区域 -->
    <a id="playlist-link" href="{{OG_URL}}" target="_blank" rel="noopener noreferrer" class="playlist-header">
      <img id="playlist-cover" src="{{COVER}}" alt="Playlist cover">
      <div class="playlist-info">
        <h2 id="playlist-title">{{TITLE}}</h2>
        <p id="playlist-author">{{AUTHOR}}</p>
      </div>
      <svg class="spotify-logo" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
      </svg>
    </a>

    <!-- 当前播放区域（垂直居中） -->
    <div id="player" class="player hidden">
      <div class="album-art">
        <img id="album-cover" src="" alt="Album cover">
      </div>
      <div class="info">
        <h2 id="track-name">—</h2>
        <p id="artist-name">—</p>
        <p id="album-name">—</p>
      </div>
    </div>

    <div id="status">加载中...</div>
    <div id="error" class="error hidden"></div>
  </div>

  <div id="status-bar">
    <div id="status-icon" class="status-icon paused"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
