<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Now Playing - Last.fm</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎵 正在播放</h1>
    <div id="status">加载中...</div>
    <div id="player" class="player hidden">
      <div class="album-art">
        <img id="album-cover" src="" alt="Album cover">
      </div>
      <div class="info">
        <h2 id="track-name">—</h2>
        <p id="artist-name">—</p>
        <p id="album-name">—</p>
        <p id="now-playing-indicator" class="nowplaying">正在播放 ▶️</p>
      </div>
    </div>
    <div id="error" class="error hidden"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
