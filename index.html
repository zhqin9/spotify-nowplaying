<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Now Playing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <a id="playlist-link" href="https://open.spotify.com/playlist/44Xq0ZjwweqahmogY3gM5M" target="_blank" rel="noopener noreferrer" class="playlist-header">
      <img id="playlist-cover" src="" alt="Playlist cover">
      <div class="playlist-info">
        <h2 id="playlist-title">加载歌单信息...</h2>
        <p id="playlist-author">—</p>
      </div>
    </a>

    <h1 class="section-title">🎵 正在播放</h1>

    <div id="status">加载中...</div>
    <div id="player" class="player hidden">
      <div class="album-art">
        <img id="album-cover" src="" alt="Album cover">
      </div>
      <div class="info">
        <h2 id="track-name">—</h2>
        <p id="artist-name">—</p>
        <p id="album-name">—</p>
        <p id="now-playing-indicator" class="nowplaying">正在播放 ▶️</p>
      </div>
    </div>
    <div id="error" class="error hidden"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
